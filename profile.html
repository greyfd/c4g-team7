<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile | AI Assistant</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}


body{

    min-height:100vh;

    background:
        radial-gradient(circle at 10% 10%, 
        rgba(6,182,212,.35),
        transparent 30%),

        radial-gradient(circle at 90% 80%,
        rgba(37,99,235,.35),
        transparent 35%),

        #020617;

    color:white;

}


/* MAIN LAYOUT */

.container{

    width:100%;
    min-height:100vh;

    display:flex;
    flex-direction:column;

}



/* HEADER */


.header{

    height:90px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 60px;

    background:
    rgba(255,255,255,.06);

    backdrop-filter:blur(20px);

    border-bottom:
    1px solid rgba(255,255,255,.12);

}


.logo{

    font-size:30px;
    font-weight:700;

}


.logo span{

    color:#22d3ee;

}


.profile{

    display:flex;
    align-items:center;
    gap:20px;

}


.email{

    color:#cbd5e1;
    font-size:16px;

}



.logout{

    padding:12px 25px;

    border:none;

    border-radius:14px;

    background:
    linear-gradient(135deg,#06b6d4,#2563eb);

    color:white;

    font-size:15px;

    cursor:pointer;

    transition:.3s;

}


.logout:hover{

    transform:translateY(-3px);

    box-shadow:
    0 10px 30px rgba(34,211,238,.4);

}





/* CONTENT */


.content{

    flex:1;

    padding:50px 80px;

}



.title{

    font-size:42px;

    margin-bottom:10px;

}


.subtitle{

    color:#94a3b8;

    font-size:18px;

    margin-bottom:40px;

}





/* HISTORY */


#history{

    display:flex;

    flex-direction:column;

    gap:25px;

    max-height:70vh;

    overflow-y:auto;

    padding-right:15px;

}



#history::-webkit-scrollbar{

    width:8px;

}


#history::-webkit-scrollbar-thumb{

    background:#0891b2;

    border-radius:20px;

}





/* CHAT CARD */


.chat-card{


    background:
    rgba(255,255,255,.07);


    border:
    1px solid rgba(255,255,255,.15);


    backdrop-filter:blur(20px);


    border-radius:25px;


    padding:30px;


    transition:.3s;


}



.chat-card:hover{


    transform:translateY(-5px);


    border-color:#22d3ee;


    box-shadow:
    0 20px 40px rgba(0,0,0,.35);


}



.question{


    color:#67e8f9;

    font-size:21px;

    font-weight:600;

    margin-bottom:20px;

}



.answer{

    color:#e2e8f0;

    line-height:1.7;

    font-size:16px;

}



.date{

    margin-top:20px;

    color:#64748b;

    font-size:14px;

}





/* EMPTY STATE */


.empty{

    text-align:center;

    margin-top:100px;

    color:#94a3b8;

    font-size:20px;

}



</style>

</head>



<body>


<div class="container">


<header class="header">


<div class="logo">
AI<span>Research</span>
</div>



<div class="profile">

<p class="email" id="email"></p>


<button class="logout" onclick="logout()">
Logout
</button>


</div>


</header>




<main class="content">


<h1 class="title">
Your Conversations
</h1>


<p class="subtitle">
Review your previous AI research sessions
</p>



<div id="history">

</div>



</main>


</div>



<script type="module" src="SCRIPT copy.js"></script>


</body>

</html>
