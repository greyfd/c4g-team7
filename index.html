<!DOCTYPE html>
<html lang="en">
<head>
    <title>AI Research Paper Summarizer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        label {
            font-weight: bold;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #2c7be5;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a5bb8;
        }

        .section {
            margin-top: 25px;
        }
    </style>

</head>

<body>

<div class="container">

<h1>AI Research Paper Summarizer</h1>

<p>
    Upload a research paper and ask questions to get AI-powered insights.
</p>

    <div class="section">
        <label for="pdfInput">Submit Your PDF File Here:</label>
        <br>
        <input type="file" id="pdfInput" accept="application/pdf">
    </div>

    <div class="section">
        <input type="text" id="userQuery" placeholder="Enter your question here">
        <br>
        <button onclick="Query()">Enter</button>
    </div>

    <div class="section">
        <input type="text" id="email" placeholder="Enter your email">
        <br>

        <input type="password" id="password" placeholder="Enter your password">
        <br>

        <button onclick="Authentication()">Sign Up</button>
    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
