<!DOCTYPE html>
<html lang="en">

<head>

<title>Notes</title>

<style>

body{

    margin:0;
    min-height:100vh;

    background:
    radial-gradient(circle at 15% 15%,
        rgb(6,154,180) 0%,
        transparent 30%),

    radial-gradient(circle at 85% 80%,
        rgba(6,182,212,.45) 0%,
        transparent 25%),

    #0f172a;

    background-repeat:no-repeat;
    background-size:cover;
}


/* Title */

.title{

    font-size:35px;
    text-align:center;

    transform:translateY(60px);

    background:
    linear-gradient(
        180deg,
        rgb(153,234,252),
        rgb(24,161,179),
        white
    );

    background-clip:text;
    color:transparent;

    font-style:oblique;

}


/* whole notebook */

.notebook{

    width:1200px;
    margin:auto;
    transform: translateY(70px);

}


/* tabs container */

#tabs{

    display:flex;

    gap:5px;

    margin-left:60px;

}


/* individual tabs */

.tab{

    height:40px;

    padding:0 25px;

    background:white;

    border:none;

    border-radius:
    20px 20px 0 0;

    font-size:18px;

    cursor:pointer;

}


/* add button */

.add{

    margin-left:20px;

    width:50px;

    height:40px;

    font-size:30px;

    background:white;

    border:none;

    border-radius:
    20px 20px 0 0;

    cursor:pointer;

    transform: translate(-45px, -1140px);

}


/* notebook paper */

.notes{
    padding-left:90px;

    width:1200px;

    height:600px;

    font-size:20px;

    border:none;

    border-radius:
    0 20px 20px 20px;


    background:
    linear-gradient(
        145deg,
        rgba(255,255,255,.95),
        rgba(220,245,255,.95)
    );


    font-family:
    'Segoe UI',
    sans-serif;

}


.notes:focus{

    outline:none;

}


    img {
        width: 90px;
        height: 600px;
        transform: translate(45px, -530px);
        border-radius: 25px;
    }

    .notes::placeholder {
        transform: translateX(2px);
    }

    .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;

        padding: 20px 60px;

        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(15px);

        border-bottom: 1px solid rgba(255,255,255,.2);

        transform: translate(1px, -1420px);
    }

.nav-links {
    display: flex;
    gap: 120px;
}

.nav-links a {
    text-decoration: none;
    color: white;
    font-size: 40px;
    font-family: 'Segoe UI', sans-serif;
    transition: 0.25s;
    transform: translate(70px);
    word-spacing: 30%;
}

.nav-links a:hover {
    color: rgb(70, 220, 255);
}

</style>

</head>


<body>


<div class="title">

<h1>
Scholar Hub
</h1>

</div>



<div class="notebook">


    <!-- Tabs appear here -->
    <div id="tabs"></div>


    <textarea 
    id="notes"
    class="notes"
    placeholder="Write your thoughts here..."
    ></textarea>


</div>

<img src="hoops.png">



<button 
class="add"
onclick="tabPlus()">

+

</button>



<script>

let tabs = [];



let currentTab = null;


window.tabPlus = function(){


    let newTab = {


        id: Date.now(),


        title:
        "Note " + 
        (tabs.length + 1),


        content:""

    };



    tabs.push(newTab);



    let button =
    document.createElement("button");



    button.className="tab";


    button.innerText =
    newTab.title;



    button.onclick=function(){

        switchTab(newTab.id);

    };



    document
    .getElementById("tabs")
    .appendChild(button);


    switchTab(newTab.id);


};



function switchTab(id){


    let tab =
    tabs.find(
        t=>t.id===id
    );



    currentTab=id;



    document
    .getElementById("notes")
    .value =
    tab.content;


}




document
.getElementById("notes")
.addEventListener(
"input",
function(){


    let tab =
    tabs.find(
        t=>t.id===currentTab
    );



    if(tab){

        tab.content =
        this.value;

    }


});



</script>

<nav class="navbar">

        <div class="nav-links">
            <a href="test.html">Home</a>
            <a href="features.html">Features</a>
            <a href="About.html">About</a>
            <a href="login.html">Login</a>
            <a href="Notes.html">Notes</a>
        </div>
    </nav>


</body>

</html>
